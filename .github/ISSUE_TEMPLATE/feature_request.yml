name: Feature request
description: Suggest an improvement that fits the project scope
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please keep requests focused on preflight validation for datasets and inference payloads.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or workflow gap does this address?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like `orya-guard` to do?
      placeholder: Describe the smallest useful solution.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What workarounds or alternatives have you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Include examples, sample commands, or related tools.
