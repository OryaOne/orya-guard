name: Bug report
description: Report a bug or regression in orya-guard
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, file formats, and data shape when relevant.
      placeholder: |
        1. Run ...
        2. Use file ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The `orya-guard` version, if known.
      placeholder: 0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and anything else relevant.
      placeholder: Python 3.11 on macOS 15
